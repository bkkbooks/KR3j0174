body:
  text: 長物志卷七明文震亨撰器具古人製器尚用不惜所費故制作極備非若後人苟且上至鐘鼎刀劔盤匜之屬下至隃糜側理皆以精良爲樂匪徒銘金石尚欵識而已今人見聞不廣又習見時世所尚遂致雅俗莫辨更有専事絢麗目不識古軒牕几案毫無韻物而侈言陳設未之敢䡖許也志器具第七香罏三代秦漢鼎彞及官哥定窑龍泉宣窑皆以備賞鑒非日用所宜惟宣銅彞罏稍大者最為適用宋姜鑄亦可惟不可用神罏太乙及鎏金白銅雙魚象鬲之類尤忌者雲間潘銅胡銅所鑄八吉祥倭景百釘諸俗式及新製建窑五色花窑等罏又古青緑博山亦可間用木鼎可置山中石鼎惟以供佛餘俱不入品古人鼎彞俱有底盖今人以木為之烏木者最上紫檀花梨俱可忌菱花葵花諸俗式罏頂以宋玉㡌頂及角端海獸諸樣隨罏大小配之瑪瑙水晶之屬舊者亦可用香合宋剔合色如珊瑚者為上古有一劔環二花草三人物之說又有五色漆胎刻法深淺隨妝露色如紅花緑葉黄心黑石者次之有倭盒三子五子者有倭撞金銀片者有果園厰大小二種底盖各置一厰花色不等故以一合為貴有内府填漆合俱可用小者有定窑饒窑蔗叚串鈴二式餘不入品尤忌描金及書金字徽人剔漆并磁合即宣成嘉隆等窑俱不可用隔火罏中不可斷火即不焚香使其長溫方有意趣且灰燥易燃謂之活灰隔火砂片第一定片次之玉片又次之金銀不可用以火浣布如錢大者銀鑲四圍供用尤妙匙筯紫銅者佳雲間胡文明及南都白銅者亦可用忌用金銀及長大填花諸式筯瓶官哥定窑者雖佳不宜日用吴中近製短頸細孔者挿筯下重不仆銅者不入品袖罏熏衣炙手袖罏最不可少以倭製漏空罩盖漆鼓為上新製輕重方圓二式俱俗製也手罏以古銅青緑大盆及簠簋之屬為之宣銅獸頭三脚鼓罏亦可用惟不可用黄白銅及紫檀花梨等架脚罏舊鑄有頫仰蓮坐細錢紋者有形如匣者最雅被罏有香毬等式俱俗竟廢不用香筒舊者有李文甫所製中雕花鳥竹石略以古簡為貴若太渉脂粉或雕鏤故事人物便稱俗品亦不必置懷袖間筆格筆格雖為古製然既用研山如靈壁英石峰巒起伏不露斧鑿者為之此式可廢古玉有山形者有舊玉子母猫長六七寸白玉為母餘取玉玷或純黄純黑玳瑁之類為子者古銅有鏒金雙螭挽格有十二峯為格有單螭起伏為格窑器有白定三山五山及臥花哇者俱藏以供玩不必置几研間俗子有以老樹根枝蟠曲萬狀或為龍形爪牙俱備者此俱最忌不可用筆牀筆牀之製世不多見有古鎏金者長六七寸髙寸二分濶二寸餘上可臥筆四矢然形如一架最不美觀即舊式可廢也筆屏鑲以挿筆亦不雅觀有宋内製方圓玊花版有大理舊石方不盈尺者置几案間亦為可厭竟廢此式可也筆筒湘竹栟櫚者佳毛竹以古銅鑲者為雅紫檀烏木花梨亦間可用忌八稜菱花式陶者有古白定竹節者最貴然艱得大者冬青磁細花及宣窑者俱可用又有鼓樣中有孔挿筆及墨者雖舊物亦不雅觀筆舩紫檀烏木細鑲竹篾者可用惟不可以牙玊為之筆洗玉者有鉢盂洗長方洗玉環洗古銅者有古鏒金小洗有青緑小盂有小釡小巵匜此五物原非筆洗今用作洗最佳陶者有官哥葵花洗磬口洗四捲荷葉洗捲口蔗叚洗龍泉有雙魚洗菊花洗百折洗定窑有三篐洗梅花洗方池洗宣窑有魚藻洗葵瓣洗磬口洗鼓樣洗俱可用忌縧環及青白相間諸式又有中盞作洗邊盤作筆覘者此不可用筆覘定窑龍泉小淺碟俱佳水晶琉璃諸式俱不雅有玉碾片葉為之者尤俗水中丞銅性猛貯水久則有毒易脆筆故必以陶者為佳古銅入土嵗久與窑器同惟宣銅則斷不可用玉者有元口瓮腹大僅如拳古人不知何用今以盛水最佳古銅者有小尊罍小甑之屬俱可用陶者有官哥瓮肚小口鉢盂諸式近有陸子岡所製獸面錦地與古尊罍同者雖佳器然不入品水注古銅玉俱有辟邪蟾蜍天鷄天鹿半身鸕鷀杓鏒金鴈壺諸式滴子一合者為佳有銅鑄眠牛以牧童騎牛作注管者最俗大抵鑄為人形即非雅器又有犀牛天祿龜龍天馬口􅋦小盂者皆古人注油㸃燈非水滴也陶者有官哥白定方圓立𤓰臥𤓰雙桃蓮房蔕葉茄壺諸式宣窑有五采桃注石榴雙𤓰雙鴛諸式俱不如銅者為雅糊斗有古銅有盖小提卣大如拳上有提梁索股者有瓮肚如小酒杯式乘方座者有三篐長桶下有三足姜鑄回文小方斗俱可用陶者有定窑蒜蒲長礶哥窑方斗如斛中置一梁者然不如銅者便扵出洗蠟斗古人以蠟代糊故緘封必用蠟斗熨之今雖不用蠟亦可收以充玩大者亦可作水杓鎮紙玉者有古玉兔玉牛玉馬玉鹿玉羊玉蟾蜍蹲虎辟邪子母螭諸式最古雅銅者有青緑蝦蟆蹲虎蹲螭眠犬鎏金辟邪臥馬龜龍亦可用其瑪瑙水晶官哥定窑俱非雅器宣銅馬牛猫犬狻猊之屬亦有絶佳者壓尺以紫檀烏木為之上用舊玉璏為紐俗所稱昭文帯是也有倭人鏒金雙桃銀葉為紐雖極工緻亦非雅物又有中透一竅内藏刀錐之屬者尤為俗製秘閣以長樣古玉璏為之最雅不則倭人所造黑漆秘閣如古玉圭者質輕如紙最妙紫檀雕花及竹雕花巧人物者俱不可用貝光古以貝螺為之今得水晶瑪瑙古玉物中有可代者更雅裁刀有古刀筆青緑裹身上尖下圓長僅尺許古人殺青為書故用此物今僅可供玩非利用也日本畨夷有絶小者鋒甚利刀靶俱用鸂鶒木取其不染肥膩最佳滇中鏒金銀者亦可用溧陽崑山二種俱入惡道而陸小拙為尤甚矣剪刀有賔鐵剪刀外面起花鍍金内嵌回囘字者製作極巧倭製摺疊者亦可用書燈有古銅駝燈羊燈龜燈諸葛燈俱可供玩而不適用有青緑銅荷一片檠架花朶於上古人取金蓮之意今用以為燈最雅定窑三臺宣窑二臺者俱不堪用錫者取舊製古朴矮小者為佳燈閩中珠燈第一玳瑁琥珀魚魫次之羊皮燈名手如趙虎所畵者亦當多蓄料絲出滇中者最勝丹陽所製有横光不甚雅至如山東珠麥柴梅李花草百鳥百獸夾紗墨紗等製俱不入品燈樣以四方如屏中穿花鳥清雅如畵者為佳人物樓閣僅可于羊皮屏上用之他如蒸籠圏水精毬雙層三層者俱最俗篾絲者雖極精工華絢終為酸氣曾見元時布燈最竒亦非時尚也鏡秦陀黒漆古光背質厚無文者為上水銀古花背者次之有如錢小鏡滿背青緑嵌金銀五嶽圖者可供㩗具菱角八角有柄方鏡俗不可用軒轅鏡其形如毬臥榻前懸挂取以辟邪然非舊式鈎古銅腰束縧鈎有金銀碧填嵌者有片金銀者有用獸為肚者皆三代物也有羊頭鈎螳螂捕蟬鈎鏒金者皆秦漢物也齋中多設以備懸壁挂畵及拂塵羽扇等用最雅自寸以至盈尺皆可用束腰漢鈎漢玦僅二寸餘者用以束腰甚便稍大則便入玩器不可日用縚用沈香真紫餘俱非所宜禪燈高麗者佳有月燈其光白瑩如初月有日燈得火内照一室皆紅小者尤可愛高麗有頫仰蓮三足銅罏原以置此今不可得别作小架架之不可製如角燈之式香櫞盤有古銅青綠盤有官哥定窑冬青磁龍泉大盤有宣徳暗花白盤蘇麻尼青盤朱砂紅盤以置香櫞皆可此種出時山齋最不可少然一盆四頭既板且套㦯以大盆置二三十尤俗不如覓舊硃雕茶槖架一頭以供清玩或得舊磁盆長樣者置二頭于几案間亦可如意古人用以指揮向徃㦯防不測故煉鐵為之非直美觀而已得舊鐵如意上有金銀錯㦯隱㦯見古色濛然者最佳至如天生樹枝竹鞭等制皆廢物也麈古人用以清談今若對客揮麈便見之欲嘔矣然齋中懸挂壁上以備一種有舊玉柄者其拂以白尾及青絲為之雅若天生竹鞭萬嵗藤雖玲瓏透漏俱不可用錢錢之為式甚多詳具錢譜有金嵌青緑刀錢可為籖如博古圖等書成大套者用之鵝眼貨布可挂杖頭瓢得小匾葫蘆大不過四五寸而小者半之以水磨其中布擦其外光彩瑩潔水濕不變塵汚不染用以懸挂杖頭及樹根禪椅之上俱可更有二瓢並生者有可為冠者俱雅其長腰鷺鶿曲項俱不可用鉢取深山巨竹根車旋為鉢上刻銘字㦯梵書或五嶽圖填以石青光潔可愛花缾古銅入土年久受土氣深以之養花花色鮮明不特古色可玩而已銅器可挿花者曰尊曰罍曰觚曰壺随花大小用之磁器用官哥定窑古膽缾一枝缾小蓍草缾紙槌缾餘如闇花青花茄袋葫蘆細口匾肚瘦足藥罈及新鑄銅缾建窑等缾俱不入清供尤不可用者鵝頸壁瓶也古銅漢方瓶龍泉均州缾有極大高二三尺者以挿古梅最相稱缾中俱用錫作替管盛水可免破裂之患大都瓶寧瘦無過壯寧大無過小高可一尺五寸低不過一尺乃佳鐘磬不可對設得古銅秦漢鏄鐘編鐘及古靈壁石磬聲清韻逺者懸之齋室擊以清耳磬有舊玊者股三寸長尺餘僅可供玩杖鳩杖最古盖老人多咽鳩能治咽故也有三代立鳩飛鳩杖頭周身金銀填嵌者飾于方竹笻竹萬嵗藤之上最古杖須長七尺餘摩弄滑澤乃佳天台藤更有自然屈曲者一作龍頭諸式斷不可用坐墩冬月用蒲草為之高一尺二寸四面編束細密堅實内用木車坐板以柱托頂外用錦飾暑月可置藤墩宫中有繡墩形如小鼓四角垂流蘇者亦精雅可用坐團蒲團大徑三尺者席地快甚棕團亦佳山中欲逺濕辟蟲以雄黄熬蠟作蠟布團亦雅數珠以金剛子小而花細者為貴以宋做玉降魔杵玉五供養為記總他如人頂龍充珠玉瑪瑙琥珀金珀水晶珊瑚􅟴璖者俱俗沉香伽南香者則可尤忌杭州小菩提子及灌香扵内者畨經常見畨僧佩經或皮袋或漆匣大方三寸厚寸許匣外兩傍有耳繫䋲佩服中有經文更有貝葉金書彩畵天魔變相精巧細宻斷非中華所及此皆方物可貯佛室與數珠同携扇扇墜羽扇最古然得古團扇雕漆柄為之乃佳他如竹篾紙糊竹根紫檀柄者俱俗又今之摺疊扇古稱聚頭扇乃日本所進彼中今尚有絶佳者展之盈尺合之僅兩指許所畵多作仕女乘車跨馬踏青拾翠之狀又以金銀屑飾地面及作星漢人物粗有形似其所染青緑竒甚専以空青海緑為之真竒物也川中蜀府製以進御有金鉸藤骨面薄如輕綃者最為貴重内府别有彩畵五毒百鶴鹿百福夀等式差俗然亦華絢可觀徽杭亦有稍䡖雅者姑蘇最重書畵扇其骨以白竹棕竹烏木紫白檀湘妃眉緑等為之間有用牙及玳瑁者有員頭直根縚環結子板板花諸式素白金面購求名筆圖寫佳者價絶髙其匠作則有李昭李贊馬勲蔣三柳玉臺沈少樓諸人皆高手也紙敝墨渝不堪懷袖别裝卷冊以供玩相沿既乆習以成風至稱為姑蘇人事然實俗製不如川扇適用耳扇墜夏月用伽楠沉香為之漢玉小玦及琥珀眼掠皆可香串緬茄之屬斷不可用枕有書枕用紙三大卷状如碗品字相疊束縛成枕有舊窑枕長二尺五寸濶六寸者可用長一尺者謂之尸枕乃古墓中物不可用也簟茭蔁出滿喇伽國生扵海之洲渚􅜌邊葉性柔軟織為細簟冬月用之愈覺溫暖夏則蘄州之竹簟最佳琴琴為古樂雖不能操亦須壁懸一牀以古琴歴年既乆漆光退盡紋如梅花黯如烏木彈之聲不沉者為貴琴軫犀角象牙者雅以蚌珠為徽不貴金玉絃用白色柘絲古人雖有朱絃清越等語不如素質有天然之妙唐有雷文張越宋有施木舟元有朱致逺國朝有恵祥高騰祝海鶴及樊氏路氏皆造琴高手也挂琴不可近風露日色琴囊須以舊錦為之軫上不可用紅緑流蘇抱琴勿横夏月彈琴但宜早晚午則汗易汙且太燥脆絃琴臺以河南鄭州所造古郭公磚上有方勝及象眼花者以作琴臺取其中空彂響然此實宜置盆景及古石當更制一小几長過琴一尺高二尺八寸濶容三琴者為雅坐用胡牀兩手更便運動須比他坐稍高則手不費力更有紫檀為邊以錫為池水晶為面者扵臺中置水蓄魚藻實俗製也研研以端溪為上出廣東肇慶府有新舊坑上下巖之辨石色深紫襯手而潤叩之清逺有重暈青緑小鸚鵒眼者為貴其次色赤呵之乃潤更有紋慢而大者乃西坑石不甚貴也又有天生石子温潤如玉摩之無聲彂墨而不壞筆真希世之珍有無眼而佳者若白端青緑端非眼不辨黑端出湖廣辰沅二州亦有小眼但石質粗燥非端石也更有一種出婺源歙山龍尾溪亦有新舊二坑南唐時開至北宋已取盡故舊硯非宋者皆此石石有金銀星及羅紋刷絲眉子青黑者尤貴􅤰溪石出湖廣常徳辰州二界石色淡青内深紫有金線及黄胍俗所謂紫袍金帯者是洮溪研出陜西臨洮府河中石緑色潤如玉衢硏出衢州開化縣有極大者色黑熟鐵研出青州古瓦研出相州澄泥硏出號州研之樣製不一宋時進御有玉臺鳳池玉環玉堂諸式今所稱貢研世絶重之以髙七寸濶四寸下可容一拳者為貴不知此特進奉一種其製最俗余所見宣和舊研有絶大者有小八稜者皆古雅渾朴别有圓池東坡瓢形斧形端明諸式皆可用葫蘆樣稍俗至如雕鏤二十八㝛鳥獸龜龍天馬及以眼為七星形剝落研質嵌古銅玉器扵中皆入惡道研須日滌去其積墨敗水則墨光瑩澤惟研池邊斑駁墨跡乆浸不浮者名曰墨繡不可磨去研用則貯水畢則乾之滌硯用蓮房殻去垢起滯又不傷研大忌滚水磨墨茶酒俱不可尤不宜令頑童持洗研匣宜用紫黑二漆不可用五金盖金能燥石至如紫檀烏木及雕紅彩漆俱俗不可用筆尖齊圓健筆之四徳盖毫堅則尖毫多則齊用檾貼襯得法則毫束而圓用純毫附以香狸角水得法則用久而健此製筆之訣也古有金銀管象管玳瑁管玻􅀈管縷金緑沈管近有紫檀雕花諸管俱俗不可用惟斑管最雅不則竟用白竹尋丈書筆以木為管亦俗當以笻竹為之盖竹細而節大易扵把握筆頭式須如尖筍細腰葫蘆諸樣僅可作小書然亦時製也畵筆杭州者佳古人用筆洗盖書後即滌去滯墨毫堅不脫可耐久筆敗則瘞之故云敗筆成塚非虛語也墨墨之妙用質取其輕煙取其清嗅之無香摩之無聲若晉唐宋元書畵皆傳數百年墨色如漆神氣完好此佳墨之效也故用墨必擇精品且日置几案間即樣製亦須近雅如朝官魁星寶瓶墨玦諸式即佳亦不可用宣徳墨最精幾與宣和内府所製同當蓄以供玩或以臨摹古書畵盖膠色已退盡惟存墨光耳唐以奚廷珪為第一張遇第二廷珪至賜國姓今其墨㡬與珍寶同價紙古人殺青為書後乃用紙北紙用横簾造其紋横其質鬆而厚謂之側理南紙用竪簾二王真蹟多是此紙唐人有硬黄紙以黄蘖染成取其辟蠧蜀妓薛濤為紙名十色小箋又名蜀箋宋有澄心堂紙有黄白經箋可掲開用有碧雲春樹龍鳳團花金花等箋有匹紙長三丈至五丈有彩色粉箋及藤白鵠白蠶繭等紙元有彩色粉箋蠟箋黄箋花箋羅紋箋皆出紹興有白籙觀音清江等紙皆出江西山齋俱當多蓄以備用國朝連七觀音奏本榜紙俱不佳惟大内用細密灑金五色粉箋堅厚如板面砑光如白玉有印金花五色箋有青紙如叚素俱可寶近吴中灑金紙松江潭箋俱不耐久涇縣連四最佳高麗别有一種以綿繭造成色白如綾堅韌如帛用以書寫彂墨可愛此中國所無亦竒品也劔今無劔客故世少名劔即鑄劔之法亦不傳古劔銅鐵互用陶𢎞景刀劔録所載有屈之如鈎縱之直如絃鏗然有聲者皆目所未見近時莫如倭奴所鑄青光射人曾見古銅劔青緑四裹者蓄之亦可愛玩印章以青田石瑩潔如玉照之燦若燈輝者為雅然古人實不重此五金牙玊水晶木石皆可為之惟陶印則斷不可用即官哥冬青等窑皆非雅器也古鏒金鍍金細錯金銀商金青緑金玉瑪瑙等印篆刻精古鈕式竒巧者皆當多蓄以供賞鑒印池以官哥窑方者為貴定窑及八角委角者次之青花白地有盖長樣俱俗近做周身連盖滚螭白玉印池雖工緻絶倫然不入品所見有三代玉方池内外土銹血侵不知何用令以為印池甚古然不宜日用僅可備文具一種圖書匣以豆瓣楠赤水欏為之方樣套盖不則退光素漆者亦可用他如剔漆填漆紫檀鑲嵌古玉及毛竹攅竹者俱不雅觀文具文具雖時尚然出古名匠手亦有絶佳者以豆瓣楠癭木及赤水欏為雅他如紫檀花梨等木皆俗三格一替替中置小端硯一筆覘一書冊一小硯山一宣徳墨一倭漆墨匣一首格置玉秘閣一古玉或銅鎮紙一賔鐵古刀大小各一古玉柄棕帚一筆船一高麗筆二枝次格古銅水盂一糊斗蠟斗各一古銅水杓一青緑鎏金小洗一下格稍高置小宣銅彞罏一宋剔合一倭漆小撞白定㦯五色定小合各一矮小花尊㦯小觶一圖書匣一中藏古玉印池古玉印鎏金印絶佳者數方倭漆小梳匣一中置玳瑁小梳及古玉盤匜等器古犀玉小盃二他如古玩中有精雅者皆可入之以供玩賞梳具以癭木為之㦯日本所製其纒絲竹絲螺鈿雕漆紫檀等俱不可用中置玳瑁梳玉剔帚玉缸玉合之類即非秦漢間物亦以稍舊者為佳若使新俗諸式䦨入便非韻士所宜用矣海論銅玉雕刻窑器三代秦漢人製玉古雅不煩即如子母螭臥蠶紋雙鈎碾法宛轉流動細入毫髮渉世既久土繡血侵最多惟翡翠色水銀色為銅侵者特一二見耳玉以紅如鷄冠者為最黄如蒸栗白如截肪者次之黒如㸃漆青如新栁緑如鋪絨者又次之今所尚翠色通明如水晶者古人號為碧非玉也玉器中圭璧最貴鼎彞觚尊杯注環玦次之鈎束鎮紙玉璏充耳剛夘􅖰珈珌琫印章之類又次之琴劒觹佩扇墜又次之銅器鼎彞觚尊敦鬲最貴匜卣罍觶次之簠簋鍾注㰱血盆奩花囊之屬又次之三代之辨商則質素無文周則雕篆細密夏則嵌金銀細巧如髮欵識少者一二字多則二三十字其或二三百字者定周末先秦時器篆文夏用鳥跡商用蟲魚周用大篆秦以大小篆漢以小篆三代用隂欵秦漢用陽欵間有凹入者㦯用刀刻如鐫碑亦有無欵者盖民間之器無功可紀不可遽謂非古也有謂銅氣入土久土氣濕蒸鬱而成青入水久水氣滷浸潤而成緑然亦不盡然第銅氣清瑩不雜易發青緑耳銅色褐色不如硃砂硃砂不如緑緑不如青青不如水銀水銀不如黑漆黑漆最易偽造余謂必以青緑為上偽造有冷冲者有屑湊者有燒斑者皆易辨也窑器柴窑最貴世不一見聞其製青如天明如鏡薄如紙聲如磬未知然否官哥汝窑以粉青色為上淡白次之油灰最下紋取冰裂鱔血鐵足為上梅花片墨紋次之細碎紋最下官窑隱紋如蟹爪哥窑隱紋如魚子定窑以白色而加以泑水如淚痕者佳紫色黑色俱不貴均州窑色如胭脂者為上青若葱翠紫若墨色者次之雜色者不貴龍泉窑甚厚不易茅蔑第工匠稍拙不甚古雅宣窑冰裂鱔血紋者與官哥同隱紋如橘皮紅花青花者俱鮮彩奪目堆垜可愛又有元燒樞府字號亦有可取至扵永樂細欵青花杯成化五彩葡萄杯及純白薄如琉璃者今皆極貴實不甚雅雕刻精妙者以宋為貴俗子輒論金銀胎最為可笑盖其妙處在刀法圓熟藏鋒不露用朱極鮮漆堅厚而無敲裂所刻山水樓閣人物鳥獸皆儼若圖畵為佳絶耳元時張成楊茂二家亦以此技擅名一時國朝果園厰所製刀法視宋尚隔一籌然亦精細至扵雕刻器皿宋以詹成為首國朝則夏白眼擅名宣廟絶賞之吳中如賀四李攵甫陸子岡皆後來繼出高手第所刻必以白玉琥珀水晶瑪瑙等為佳器若一渉竹木便非所貴至扵雕刻果核雖極人工之巧終是惡道長物志卷七
