  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0174_WYG_005-1a, image: WYG0872/WYG0872-0050c.png}
body:
  text: 長物志卷五明文震亨撰書畵金生於山珠産扵淵取之不窮猶為天下所珍惜况圖畵在宇宙嵗月既久名人藝士不能復生可不珍祕寳愛一入俗子之手動見勞辱卷舒失所操揉燥裂真書畵之厄也故有收藏而未能識鑒識鑒而不善閱玩閱玩而不能装褫裝褫而不能銓次皆非能真蓄書畵者又蓄聚既多妍蚩混雜甲乙次第毫不可訛若使真贋並陳新舊錯出如入賈胡肆中有何趣味所藏必有晉唐宋元名蹟乃稱博古若徒取近代紙墨較量真偽心無真賞以耳為目手執卷軸口論貴賤真惡道也志書畵第五論書觀古法書當澄心定慮先觀用筆結體精神照應次觀人為天巧自然强作次考古今跋尾相傳來歴次辨收藏印識紙色絹素或得結搆而不得鋒釯者模本也得筆意而不得位置者臨本也筆勢不聮屬字形如算子者集書也形跡雖存而真彩神氣索然者雙鈎也又古人用墨無論燥潤肥痩俱透入紙素後人偽作墨浮而易辯論畵山水第一竹樹蘭石次之人物鳥獸樓殿屋木小者次之大者又次之人物顧盻語言花果迎風帯露鳥獸蟲魚精神逼真山水林泉清閒幽曠屋廬深邃橋彴徃來石老而潤水淡而明山勢崔嵬泉流灑落雲烟出沒野逕迂回松偃龍蛇竹藏風雨山腳入水澄清水源来歴分曉有此數端雖不知名定是妙手若人物如尸如塑花果類粉揑雕刻蟲魚鳥獸但取皮毛山水林泉布置廹塞樓閣糢糊錯雜橋彴强作斷形徑無夷險路無出入石止一面樹少四枝或髙大不稱㦯逺近不分或濃淡失宜㸃染無法㦯山脚無水面水源無來歴雖有名欵定是俗筆為後人填寫至扵臨摹贋手落墨設色自然不古不難辨也書畵價書價以正書為標準如右軍草書一百字乃敵一行行書三行行書敵一行正書至扵樂毅黃庭畵贊告擔但得成篇不可計以字數畵價亦然山水竹石古名賢象可當正書人物花鳥小者可當行書人物大者及神圖佛象宫室樓閣走獸蟲魚可當草書若夫臺閣標功臣之烈宫殿彰貞節之名妙將入神靈則通聖開厨㦯失挂壁欲飛但渉竒事異名即為無價國寳又書畵原為雅道一作牛鬼蛇神不可詰識無論古今名手俱落第二古今優劣書學必以時代為限六朝不及晉魏宋元不及六朝與唐畵則不然佛道人物仕女牛馬近不及古山水林石花竹禽魚古不及近如顧凱之陸探㣲張僧繇吴道𤣥及閻立徳立本皆純重雅正性出天然周昉韓幹戴嵩氣韻骨法皆出意表後之學者終莫能及至如李成闗仝范寛董源徐熙黄荃居寀二米勝國松雪大癡元鎭叔眀諸公近代唐沈及吾家太史和州輩皆不藉師資窮工極致借使二李復生邊鸞再出亦何以措手其間故蓄書必逺求上古蓄畵始自顧陸張吳下至嘉隆名筆皆有竒觀惟近時㸃染諸公則未敢輕議粉本古人畵藁謂之粉本前輩多寳蓄之盖其草草不經意䖏有自然之妙宣和紹興所藏粉本多有神妙者賞鑒看書畵如對美人不可毫渉粗浮之氣盖古畵紙絹皆脆舒卷不得法最易損壞尤不可近風日燈下不可看畵恐落煤燼及為燭淚所汚飯後醉餘欲觀卷軸須以淨水滌手展玩之際不可以指甲剔損諸如此類不可枚舉然必欲事事勿犯又恐渉强作清態惟遇真能賞鑒及閱古甚富者方可與談若對傖父輩惟有珍秘不出耳絹素古畵絹色墨氣自有一種古香可愛惟佛像有香烟熏黑多是上下二色偽作者其色黄而不精采古絹自然破者必有鯽魚口須連三四絲偽作則直裂唐絹絲粗而厚或有搗熟者有獨梭絹濶四尺餘者五代絹極粗如布宋有院絹勻淨厚宻亦有獨梭絹濶五尺餘細宻如紙者元絹及國朝内府絹俱與宋絹同勝國時有宻機絹松雪子昭畵多用此盖出嘉興府宓家以絹得名今此地尚有佳者近董太史筆多用砑光白綾未免有進賢氣御府書畵宋徽宗御府所藏書畵俱是御書標題後用宣和年號玉瓢御寳記之題畵書扵引首一條濶僅指大傍有木印黒字一行俱裝池匠花押名欵然亦真偽相雜盖當時名手臨摹之作皆題為真蹟至明昌所題更多然今人得之亦可謂買王得羊矣院畵宋畵院衆工凡作一畵必先呈稿本然後上真所畵山水人物花木鳥獸皆是無名者今國朝内畵水陸及佛像亦然金碧輝燦亦竒物也今人見無名人畵輒以形似填寫名欵覓高價如見牛必戴嵩見馬必韓幹之類皆為可笑单條宋元古畵斷無此式盖今時俗制而人絶好之齋中懸挂俗氣逼人眉睫即果真蹟亦當減價名家書畵名家收藏不可錯雜大者懸挂齋壁小者則為卷冊置几案間䆳古篆籀如鍾張衛索顧陸張吴及歴代不甚著名者不能具論書則右軍大令智永虞永興禇河南歐陽率更唐𤣥宗懷素顔魯公栁誠懸張長史李懷琳宋髙宗李建中二蘇二米范文正黄魯直蔡忠惠蘇滄浪薛紹彭黄長睿薛道祖范文穆張即之先信國趙吳興鮮于伯機康里子山張伯雨倪元鎮俞紫芝楊鐵厓柯丹丘袁清容危太素我朝則宋文憲濂中書舍人燧方遜志孝孺宋南宫克沈學士度俞紫芝和徐武功有貞金元玉珏沈大理粲解學士大紳錢文通桑栁州恱祝京兆允明吳文定寛先太史諱王太學寵李太僕應禎王文恪鏊唐解元寅顧尚書璘豐考功坊先兩博士諱王吏部榖祥陸文裕深彭孔嘉年陸尚寳師道陳方伯鎏蔡孔目羽陳山人淳張孝廉鳳翼王徴君穉登周山人天球邢侍御侗董太史其昌又如陳文東璧姜中書立剛雖不能洗院氣而亦錚錚有名者畵則王右丞李思訓父子周昉董北海李營丘郭河陽米南宫宋徽宗米元暉崔白黄筌居寀文與可李伯時郭忠恕董仲翔蘇文忠蘇叔黨王晉卿張舜民楊補之楊季衡陳容李唐馬逺馬逵夏珪范寛闗仝荆浩李山趙松雪管仲姬趙仲穆趙千里李息齋吴仲圭錢舜舉盛子昭陳珏陳仲美陸天㳺曹雲西唐子華王元章高士安高克恭王叔明黄子久倪元鎮柯丹丘方方壺戴文進王孟端夏太常趙善長陳惟允徐㓜文張來儀宋南宫周東村沈貞吉恒吉沈石田杜東原劉完菴先太史先和州五峯唐解元張夢晉周官謝時臣陳道復仇十洲錢叔寶陸叔平皆名筆不可缺者他非所宜蓄即有之亦不當出以示人又如鄭顛仙張復陽鍾欽禮蔣三松張平山汪海雲皆畵中邪學尤非所尚宋綉宋刻絲宋繡針線細密設色精妙光彩射目山水分逺近之趣樓閣得深邃之體人物具瞻眺生動之情花鳥極綽約嚵唼之態不可不蓄一二幅以備畵中一種裝潢装潢書畵秋為上時春為中時夏為下時暑濕及沍寒俱不可裝裱勿以熟紙背必皺起宜用白滑漫薄大幅生紙紙縫先避人面及接䖏若縫縫相接則卷舒緩急有損必令参差其縫則氣力均平太硬則强急太薄則失力絹素彩色重者不可擣理古畵有積年塵埃用皂莢清水數㝛托扵太平案扞去畵復鮮明色亦不落補綴之法以油紙襯之直其邊際密其隟縫正其經緯就其形制拾其遺脫厚薄均調潤潔平穩又凡書畵法帖不脫落不宜數裝背一裝背則一損精神古紙厚者必不可揭薄法糊用瓦盆盛水以麵一斤滲水上任其浮沉夏五日冬十日以臭為度後用清水蘸白芨半両白礬三分去滓和元浸麫打成就鍋内打成團另換水煮熟去水傾置一器候冷日換水浸臨用以湯調開忌用濃糊及敝帚􅋔褫定式上下天地須用皂綾龍鳳雲鶴等樣不可用團花及葱白月白二色二垂帯用白綾濶一寸許烏絲粗界畫二條玉池白綾亦用前花樣書畵小者須穵嵌用淡月白畵絹上嵌金黄綾條濶半寸許盖宣和裱法用以題識旁用沉香皮條邊大者四面用白綾或单用皮條邊亦可叅書有舊人題䟦不宜剪削無題䟦則斷不可用畵卷有高頭者不須嵌不則亦以細畵絹穵嵌引首須用宋經箋白宋箋及宋元金花箋㦯高麗繭紙日夲畵紙俱可大幅上引首五寸下引首四寸小全幅上引首四寸下引首三寸上褾除擫竹外淨二尺下褾除軸淨一尺五寸横卷長二尺者引首濶五寸前褾濶一尺餘俱以是為率褾軸古人有鏤沉檀為軸身以果金鎏金白玉水晶琥珀瑪腦雜寳為飾貴重可觀盖白檀香潔去蟲取以為身最有深意今既不能如舊製只以杉木為身用犀象角三種雕如舊式不可用紫檀花梨法藍諸俗製畵卷須出軸形製既小不妨以寶玉為之斷不可用平軸籤以犀玉為之曾見宋玉籤半嵌錦帯内者最奇裱錦古有樗蒲錦樓閣錦紫駝花鸞章錦朱雀錦鳳皇錦走龍錦翻鴻錦皆御府中物有海馬錦龜紋錦粟地錦皮毬錦皆宣和綾及宋繡花鳥山水為􅋔池卷首最古今所尚落花流水錦亦可用惟不可用宋叚及紵絹等物帯用錦帯亦有宋織者藏畵以杉桫木為匣匣内切勿油漆糊紙恐惹黴濕四五月先將畵幅幅展看㣲見日色收起入匣去地丈餘庶免黴白平時張挂須三五日一易則不厭觀不惹塵濕收起時先拂去兩面塵垢則質地不損小畵匣短軸作横面開門匣畵直放入軸頭貼籤標寫某書某畵甚便取㸔捲畵須顧邊齊不宜局促不可太寛不可着力捲𦂳恐急裂絹素拭抹用軟絹細細拂之不可以手托起畵軸就觀多致損裂法帖歴代名家碑刻當以淳化閣帖壓卷侍書王著勒末有篆題者是蔡京奉㫖摹者曰太清樓帖僧希白所摹者曰潭帖尚書郎潘思旦所摹者曰絳帖王寀輔道守汝州所刻者曰汝帖宋許提舉刻于臨江者曰二王帖元祐中刻者曰祕閣續帖淳熙年刻者曰修内司夲高宗訪求遺書扵淳熙閣摹刻者曰淳熙祕閣續帖后主命徐鉉勒石在淳化之前者曰昇元帖劉次莊摹閣帖除去篆題年月而增入釋文者曰戲魚堂帖武岡軍重摹絳帖曰武岡帖上蔡人臨摹絳帖曰蔡州帖趙彦約于南康所刻曰星鳳樓帖廬江李氏刻曰甲秀堂帖黔人秦世章所刻曰黔江帖泉州重摹閣帖曰泉帖韓平原所刻曰羣玉堂帖薛紹彭所刻曰家塾帖曹之格日新所刻曰寶晉齋帖王庭筠所刻曰雪谿堂帖周府所刻曰東書堂帖吾家所刻曰停雲館帖小停雲帖華氏刻曰真賞齋帖皆帖中名刻摹勒皆精又如歴代名帖收藏不可缺者周秦漢則史籀篆石鼓文壇山石刻李斯篆泰山胊山嶧山諸碑秦誓詛楚文章帝艸書帖蔡邕淳于長夏承碑郭有道碑九疑山碑邉韶碑宣父碑北岳碑崔子玉張平子墓碑郭香察𨽻西岳華山碑魏帖則元常賀捷表大饗碑薦季直表受禪碑上尊號碑宗聖矦碑劉𤣥州華岳碑吴帖則國山碑延陵季子二碑晉帖則蘭亭記筆陣圖黄庭經聖教序樂毅論周府君碑東方朔贊洛神賦曹娥碑告墓文攝山寺碑裴䧺碑興福寺碑宣示帖平西將軍墓銘梁思楚碑羊祜峴山碑宋齊梁陳帖則宋文帝神道碑齊倪桂金庭觀碑齊南陽寺𨽻書碑梁茅君碑瘞鶴銘劉靈正墮淚碑魏齊周帖則有魏裴思順教戒經北齊王思誠八分茅山碑後周大宗伯唐㬌碑蕭子雲章艸出師頌天柱山銘隋帖則有開皇蘭亭薛道衡書朱厰碑舍利塔銘龍藏寺碑智永真行二體千文草書蘭亭唐帖歐書則九成宫銘房定公墓碑化度寺碑皇甫君碑虞恭公碑真書千文小楷心經夢奠帖金蘭帖虞書則夫子廟堂碑破邪論寶曇塔銘隂聖道塲碑汝南公主銘孟法師碑禇書則樂毅論哀冊文忠臣像贊龍馬圖贊臨摹蘭亭臨摹聖教隂符經度人經紫陽觀碑栁書則金剛經𤣥秘塔銘顔書則爭坐位帖麻姑仙壇二祭文家廟碑元次山碑多寶寺碑放生池碑射堂記北岳廟碑艸書千文磨崖碑干禄字帖懷素書則自序三種艸書千文聖母帖藏真律公二帖李北海書則隂符經娑羅樹碑曹娥碑秦望山碑臧懷庇碑有道先生葉公碑岳麓寺碑開元寺碑荆門行雲麾將軍碑李思訓碑戒壇碑太宗書魏徴碑屏風帖李勣碑𤣥宗一行禪師塔銘孝經金仙公主碑孫過庭書譜索靖出師表栁公綽諸葛廟堂碑李陽冰篆書千文城隍廟碑孔子廟碑歐陽通道因禪師碑薛稷昇仙太子碑張旭艸書千文僧行敦遺教經宋則蘇米諸公如洋州園池天馬賦等類元則趙松雪國朝則二宋諸公所書佳者亦當兼收以供賞鑒不必太雜南北紙墨古之北紙其紋横質鬆而厚不受墨北墨色青而淺不和油蠟故色澹而紋皺謂之蟬翅搨南紙其紋𥪡用油蠟故色純黑而有浮光謂之烏金搨古今帖辨古帖歴年乆而裱數多其墨濃者堅若生漆紙面光彩如砑並無沁墨水跡侵染且有一種異馨彂自紙墨之外􅋔帖古帖宜以文木薄一分許為板面上刻碑額卷數次則用厚紙五分許以古色錦或青花白地錦為面不可用綾及雜彩色更須製匣以藏之宜少方濶不可狹長濶狹不等以白鹿紙廂邊不可用絹十冊為匣大小如一式乃佳宋板藏書貴宋刻大都書寫肥痩有則佳者有歐栁筆法紙質勻潔墨色清潤至扵格用單邊字多諱筆雖辨証之一端然非考據要訣也書以班范二書左傳國語老莊史記文選諸子為第一名家詩文雜記道釋等書次之紙白板新綿紙者為上竹紙活襯者亦可觀糊背批㸃不蓄可也懸畵月令嵗朝宜宋畵福神及古名賢像元宵前後宜看燈傀儡正二月宜春逰仕女梅杏山茶玉蘭桃李之屬三月三日宜宋畵真武像清明前後宜牡丹芍藥四月八日宜宋元人畵佛及宋繡佛像十四宜宋畵純陽像端五宜真人玉符及宋元名筆端陽㬌龍舟艾虎五毒之類六月宜宋元大樓閣大幅山水蒙密樹石大幅雲山採蓮避暑等圖七夕宜穿鍼乞巧天孫織女樓閣芭蕉仕女等圖八月宜古桂或天香書屋等圖九十月宜菊花芙蓉秋江秋山楓林等圖十一月宜雪景蠟梅水仙醉楊妃等圗十二月宜鍾馗迎福驅魅嫁魅臘月廿五宜玉帝五色雲車等圖至如移家則有葛仙移居等圖稱夀則有院畵夀星王母等圗祈晴則有東君祈雨則有古畵風雨神龍春雷起蟄等圖立春則有東皇太乙等圗皆随時懸挂以見嵗時節序若大幅神圖及杏花燕子紙帳梅過墻梅松柏鶴鹿夀意之類一落俗套斷不宜懸至如宋元小景枯木竹石四幅大景又不當以時序論也長物志卷五
