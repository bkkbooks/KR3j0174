body:
  text: 長物志卷二明文震亨撰花木弄花一嵗看花十日故幃箔映蔽鈴索䕶持非徒富貴容也第繁花襍木宜以畞計乃若庭除檻畔必以虬枝古榦異種竒名枝葉扶踈位置疎密或水邉石際横偃斜披㦯一望成林㦯孤枝獨秀艸花不可繁雜隨處植之取其四時不斷皆入圖畵又如桃李不可植扵庭除似宜逺望紅梅絳桃俱借以㸃綴林中不宜多植梅生山中有苔蘚者移置藥欄最古杏花差不耐久開時多值風雨僅可作片時玩蠟梅冬月最不可少他如豆棚菜圃山家風味固自不惡然必闢隙地數頃别為一區若扵庭除種植便非韻事更有石磉木柱架縛精整者愈入惡道至扵秇蘭栽菊古各有方時取以課園丁考職事亦幽人之務也志花木第二牡丹芍藥牡丹稱花王芍藥稱花相俱花中貴裔栽植賞玩不可毫渉酸氣用文石為欄參差數級以次列種花時設燕用木為架張碧油幔扵上以蔽日色夜則懸燈以照忌二種並列忌置木桷及盆盎中玉蘭宜種㕔事前對列數株花時如玉圃瓊林最稱絶勝别有一種紫者名木筆不堪與玉蘭作婢古人稱辛夷即此花然輞川辛夷塢木蘭柴不應複名當是二種海棠昌州海棠有香今不可得其次西府為上貼梗次之垂絲又次之余以垂絲嬌媚眞如妃子醉態較二種尤勝木𤓰花似海棠故亦有木𤓰海棠但木𤓰花在葉先海棠花在葉後為差别耳别有一種曰秋海棠性喜隂濕宜種背隂堦砌秋花中此為最艷亦宜多植山茶蜀茶滇茶俱貴黄者尤不易得人家多以配玉蘭以其花同時而紅白爛然差俗又有一種名醉楊妃開向雪中更自可愛桃桃為仙木能制百鬼種之成林如入武陵桃源亦自有致第非盆盎及庭除物桃性早實十年輒枯故稱短命花碧桃人面桃差乆較凡桃更美池邉宜多植若桃柳相間便俗李桃花如麗姝歌舞塲中定不可少李如女道士宜置烟霞泉石間但不必多種耳别有一種名郁李子更美杏杏與朱李蟠桃皆堪鼎足花亦柔媚宜築一臺雜植數十夲梅幽人花伴梅實専房取苔護蘚封枝稍古者移植石岩或庭際最古另種數畞花時坐卧其中令神骨俱清緑蕚更勝紅梅差俗更有虬枝屈曲置盆盎中者極竒蠟梅磬口為上荷花次之九英最下寒月庭際亦不可無瑞香相𫝊廬山有比丘晝寢夢中聞花香寤而求得之故名睡香四方竒異謂花中祥瑞故又名瑞香别名麝囊又有一種金邉者人特重之枝既粗俗香復酷烈能損羣花稱為花賊信不虛也薔薇木香甞見人家園林中必以竹為屏牽五色薔薇于上架木為軒名木香棚花時雜坐其下此何異酒食肆中然二種非屏架不堪植或移着閨閤供士女採掇差可别有一種名黄薔薇最貴花亦爛熳恱目更有野外叢生者名野薔薇香更濃郁可比玫瑰他如寶相金沙羅金鉢盂佛見笑七姊妺十姊妺刺桐月桂等花姿態相似種法亦同玫瑰玫瑰一名徘徊花以結為香囊芬氲不絶然實非幽人所宜佩嫰條叢刺不甚雅觀花色亦㣲俗宜充食品不宜簪帯吳中有以畞計者花時獲利甚夥紫荆棣棠紫荆枝幹枯索花如綴珥形色香韻無一可者特以京兆一事為世所述以比嘉木余謂不如多種棣棠猶得風人之㫖葵花葵花種類莫定初夏花繁葉茂最為可觀一曰戎葵竒態百出宜種曠䖏一曰錦葵其小如錢文采可玩宜種堦除一曰向日别名西畨蓮最惡秋時一種葉如龍爪花作鵝黄者名秋葵最佳罌粟以重臺千葉者為佳然單葉者子必滿取供清味亦不惡藥欄中不可缺此一種薇花薇花四種紫色之外白色者曰白薇紅色者曰紅薇紫𢃄藍色者曰翠薇此花四月開九月歇俗稱百日紅山園植之可稱耐久朋然花但宜逺望北人呼猴郎達樹以樹無皮猴不能捷也其名亦竒芙蓉宜植池􅜌臨水為佳若他處植之絶無丰致有以靛紙蘸花蕋上仍裹其尖花開碧色以為佳此甚無謂萱花蘐草忘憂亦名宜男更可供食品巖間牆角最宜此種又有金萱色淡黄香甚烈義興山谷遍滿吳中甚少他如紫白蛺蝶春羅秋羅鹿葱洛陽石竹皆此花之附庸也薝葡一名越桃一名林蘭俗名梔子古稱禪友出自西域宜種佛室中其花不宜近嗅有㣲細蟲入人鼻孔齋閣可無種也玉簪潔白如玉有㣲香秋花中亦不惡但宜牆邊連種一帯花時一望成雪若植盆石中最俗紫者名紫蕚不佳金錢午開子落故名子午花長過尺許扶以竹箭乃不傾欹種石畔尤可觀藕花藕花池塘最勝或種五色官缸供庭除賞玩猶可缸上忌設小朱欄花亦當取異種如並頭重臺品字四面觀音碧蓮金邉等乃佳白者藕勝紅者房勝不可種七石酒缸及花缸内水仙水仙二種花髙葉短單瓣者佳冬月宜多植但其性不耐寒取極佳者移盆盎置几案間次者雜植松竹之下或古梅竒石間更雅馮夷服花八石得為水仙其名最雅六朝人乃呼為雅蒜大可軒渠鳳仙號金鳳花宋避李后諱改為好兒女花其種易生花葉俱無可觀更有以五色種子同納竹筒花開五色以為竒甚無謂花紅能染指甲然亦非美人所宜茉莉素馨百合夏夜最宜多置風輪一鼔滿室清芬章江編籬挿棘俱用茉莉花時千艘俱集虎丘故花市初夏最盛培養得法亦能隔嵗彂花第枝葉非几案物不若夜合可供瓶玩杜䳌花極爛熳性喜隂畏熱宜置樹下隂䖏花時移置几案間别有一種名映山紅宜種石岩之上又名羊躑躅秋色吴中稱雞冠雁來紅十様錦之屬名秋色秋深雜彩爛然俱堪㸃綴然僅可植廣庭若幽牕多種便覺蕪雜鷄冠有矮腳者種亦竒松松柏古雖並稱然最高貴者必以松為首天目最上然不易種取栝子松植堂前廣庭或廣臺之上不妨對偶齋中宜植一株下用文石為臺或太湖石為欄俱可水仙蘭蕙萱草之屬雜􅀢其下山松宜植土岡之上龍鱗既成濤水相應何減五株九里哉木槿花中最賤然古稱舜華其名最逺又名朝菌編籬野􅜌不妨間植必稱林園佳友未之敢許也桂叢桂開時真稱香窟宜闢地二畞取各種並植結亭其中不得顔以天香小山等語更勿以他樹雜之樹下地平如掌潔不容唾花落地即取以充食品柳順挿為楊倒挿為柳更須臨池種之柔條拂水弄緑搓黄大有逸致且其種不生蟲更可貴也西湖栁亦佳頗渉脂粉氣白楊風楊俱不入品黄楊黄楊未必厄閏然實難長長丈餘者綠葉古株最可愛玩不宜植盆盎中芭蕉緑牕分映但取短者為佳盖髙則葉為風所碎耳冬月有去梗以稻艸覆之者過三年即生花結甘露亦甚不必又作盆玩者更可笑不如㯶櫚為雅且為塵尾蒲團更適用也槐榆宜植門庭板扉緑映真如翠幄槐有一種天然樛屈枝葉皆倒垂䝉密名盤槐亦可觀他如石楠冬青杉柏皆丘壠間物非園林所尚也梧桐青桐有佳䕃株緑如翠玉宜種廣庭中當日令人洗拭且取枝梗如畫者若直上而旁無他枝如拳如盖及生棉者皆所不取其子亦可㸃茶生扵山岡者曰岡桐子可作油椿椿樹髙聳而枝葉踈與樗不異香曰椿臭曰樗圃中沿牆宜多植以供食銀杏銀杏株葉扶踈新緑時最可愛吴中刹宇及舊家名園大有合抱者新植似不必烏臼秋晚葉紅可愛較楓樹更耐久茂林中有一株兩株不减石徑寒山也竹種竹宜築土為壠環水為谿小橋斜渡陟級而登上畱平臺以供坐臥科頭散髮儼如萬竹林中人也否則闢地數畞盡去雜樹四週石壘令稍髙以石柱朱欄圍之竹下不畱纎塵片葉可席地而坐或留石臺石櫈之屬竹取長枝巨幹以毛竹為第一然宜山不宜城城中則護基笋最佳竹不甚雅粉筋斑紫四種俱可燕竹最下慈姥竹即桃枝竹不入品又有木竹黄菰竹篛竹方竹黄金間碧玉觀音鳳尾金銀諸竹忌種花欄之上及庭中平植一帯牆頭直立數竿至如小竹叢生曰瀟湘竹宜扵石巖小池之畔留植數枝亦有幽致種竹有踈種宻種淺種深種之法踈種謂三四尺地方種一窠欲其土虛行鞭密種謂竹種雖疎然毎窠卻種四五竿欲其根密淺種謂種時入土不深深種為入土雖不深上以田泥壅之如法無不茂盛又棕竹三等曰筋頭曰短柄二種枝短葉垂堪植盆盎曰樸竹節稀葉硬全欠溫雅但可作扇骨料及畵义柄耳菊吴中菊盛時好事家必取數百本五色相間高下次列以供賞玩此以誇富貴容則可若眞能賞花者必覓異種用古盆盎植一枝兩枝莖挺而秀葉密而肥至花發時置几榻間坐卧把玩乃為得花之性情甘菊惟蕩口有一種枝曲如偃盖花密如鋪錦者最竒餘僅可收花以供服食野菊宜着籬落間菊有六要二防之法謂胎養土宜扶植雨暘修葺灌溉防蟲及雀作窠時必來摘葉此皆園丁所宜知又非吾輩事也至如瓦料盆及合兩瓦為盆者不如無花為愈矣蘭蘭出自閩中者為上葉如劔芒花高扵葉離騷所謂秋蘭兮青青緑葉兮紫莖者是也次則贑州者亦佳此俱山齋所不可少然毎處僅可置一盆多則類虎丘花市盆盎須覓舊龍泉均州内府供春絶大者忌用花缸牛腿諸俗製四時培植春日葉芽已彂盆土已肥不可沃肥水常以塵帚拂拭其葉勿令塵垢夏日花開葉嫰勿以手揺動待其長茂然後拂拭秋則㣲撥開根土以米泔水少許注根下勿漬汚葉上冬則安頓向陽暖室天晴無風舁出時時以盆轉動四面令勻午後即收入勿令霜雪侵之若葉黑無花則隂多故也治蟻虱惟以大盆㦯缸盛水浸逼花盆則蟻自去又治葉虱如白㸃以水一盆滴香油少許扵内用綿蘸水拂拭亦自去矣此秇蘭簡便法也又有一種出杭州者曰杭蘭出陽羡山中者名興蘭一幹數花者曰蕙此皆可移植石巖之下須得彼中原本則嵗嵗發花珍珠風蘭俱不入品箬蘭其葉如箬似蘭無馨艸花竒種金粟蘭名賽蘭香特甚瓶花堂供必髙瓶大枝方快人意忌繁雜如縛忌花瘦扵瓶忌香煙燈煤燻觸忌油手拈弄忌井水貯瓶味鹹不宜扵花忌以挿花水入口梅花秋海棠二種其毒尤甚冬月入硫黄扵瓶中則不凍盆玩盆玩時尚以列几案間者為第一列庭榭中者次之余持論則反是最古者以天目松為第一高不過二尺短不過尺許其本如臂其針若簇結為馬逺之欹斜詰曲郭熙之露頂張拳劉松年之偃亞層疊盛子照之拖拽軒翥等狀栽以佳器槎牙可觀又有古梅蒼蘚鱗皴苔鬚垂滿含花吐葉歴久不敗者亦古若如時尚作沉香片者甚無謂盖木片生花有何趣味真所謂以耳食者矣又有枸杞及水冬青野䄖檜柏之屬根若龍虵不露束縛鋸截痕者俱高品也其次則閩之水竹杭之虎刺尚在雅俗間乃若菖蒲九節神仙所珍見石則細見土則粗極難培飬吴人洗根澆水竹翦修淨謂朝取葉間垂露可以潤眼意極珍之余謂此宜以石子鋪一小庭遍種其上雨過青翠自然生香若盆中栽植列几案間殊為無謂此與蟠桃雙果之類俱未敢随俗作好也他如春之蘭蕙夏之夜合黄香萱夾竹桃花秋之黄密矮菊冬之短葉水仙及美人蕉諸種俱可随時供玩盆以青緑古銅白定官哥等窑為第一新製者五色内窑及供春粗料可用餘不入品盆宜圓不宜方尤忌長狹石以靈壁英石西山佐之餘亦不入品齋中亦僅可置一二盆不可多列小者忌架扵朱几大者忌置扵官磚得舊石櫈或古石蓮磉為座乃佳長物志卷二
