body:
  text: 長物志卷十一明文震亨撰蔬果田文坐客上客食肉中客食魚下客食菜此便開千古勢利之祖吾曹談芝討桂既不能餌菊术啖花草乃層酒累肉以供口食真可謂穢我素業古人蘋蘩可薦蔬筍可羞顧山肴野簌湏多預蓄以供長日清談閒宵小飲又如酒鎗皿合皆須古雅精潔不可毫渉市販屠沽氣又當多藏名酒及山珍海錯如鹿脯荔枝之屬庶令可口恱目不特動指流涎而已志蔬果第十一櫻桃櫻桃古名楔桃一名朱桃一名英桃又為鳥所含故禮稱含桃盛以白盤色味俱絶南都曲中有英桃脯中置玫瑰瓣一味亦甚佳價甚貴桃李梅杏桃易生故諺云白頭種桃其種有匾桃墨桃金桃鷹嘴脫核蟠桃以蜜煮之味極美李品在桃下有粉青黄姑二種别有一種曰嘉慶子味㣲酸北人不辯梅杏熟時乃别梅接杏而生者曰杏梅又有消梅入口即化脆美異常雖果中凡品然卻睡止渇亦自有致橘橙橘為木奴既可供食又可獲利有緑橘金橘密橘扁橘數種皆出自洞庭别有一種小于閩中而色味俱相似名漆堞紅者更佳出衢州者皮薄亦美然不多得山中人更以落地未成實者製為橘藥醎者較勝黄橙堪調膾古人所謂金虀若法製丁片皆稱俗味柑柑出洞庭者味極甘出新莊者無汁以刀剖而食之更有一種粗皮名蜜羅柑亦美小者曰金柑圓者曰金豆香櫞大如㮎盂香氣馥烈吴人最尚以磁盆盛供取其瓤拌以白糖亦可作湯除酒渇又有一種皮稍粗厚者香更勝枇杷枇杷獨核者佳株葉皆可愛一名欵冬花薦之果奩色如黄金味絶美楊梅吴中佳果與荔枝並擅高名各不相下出光福山中者最美彼中人以漆盤盛之色與漆等一斤僅二十枚真竒味也生當暑中不堪渉逺吴中好事家或以輕橈郵置或買舟就食出他山者味酸色亦不紫有以燒酒浸者色不變而味淡蜜漬者色味俱惡葡桃有紫白二種白者曰水晶萄味差亞扵紫荔枝荔枝雖非吳地所種然果中名裔人所共愛紅塵一騎不可謂非觧事人彼中有蜜漬者色亦白第殻已殷所謂紅繻白玉膚亦在流想間而已龍眼稱荔枝奴香味不及種類頗少價乃更貴棗棗類極多小核色赤者味極美棗脯出金陵南棗出浙中者俱貴甚生梨梨有二種花瓣圓而舒者其果甘缺而皺者其果酸亦易辨出山東有大如𤓰者味絶脆入口即化能消痰疾栗杜甫寓蜀採栗自給山家禦窮莫此為愈出吳中諸山者絶小風乾味更美出吳興者從溪水中出易壞煨熟乃佳以橄欖同食名為梅花脯謂其口作梅花香然實不盡然也銀杏葉如鴨腳故名鴨腳子雄者三棱雌者二棱園圃間植之雖所出不足充用然新緑時葉最可愛吳中諸刹多有合抱者扶疎喬挺最稱佳樹柿柿有七絶一夀二多隂三無鳥巢四無蟲五霜葉可愛六嘉實七落葉肥大别有一種名燈柿小而無核味更美或謂柿接三次則全無核未知果否菱兩角為菱四角為芰吴中湖泖及人家池沼皆種之有青紅二種紅者最早名水紅菱稍遲而大者曰雁來紅青者曰鶯哥青青而大者曰餛飩菱味最勝最小者曰野菱又有白沙角皆秋來美味堪與扁豆並薦芡芡花晝合宵展至秋作房如鷄頭實藏其中故俗名鷄豆有秔穤二種有大如小龍眼者味最佳食之益人若剝肉和糖擣為糕糜真味盡失花紅西北稱柰家以為脯即今之蘋婆果是也生者較勝不特味美亦有清香吳中稱花紅即名林檎又名來禽似柰而小花亦可愛石榴石榴花勝于果有大紅桃紅淡白三種千葉者名餅子榴酷烈如火無實宜植庭際西𤓰西𤓰味甘古人與沉李並埒不僅蔬屬而已長夏消渇吻最不可少且能觧暑毒五加皮久服輕身明目吴人于早春採取其芽􅀈乾㸃茶清香特甚味亦絶美亦可作酒服之延年白扁豆純白者味美補脾入藥秋深籬落當多種以供採食乾者亦須收數斛以足一嵗之需菌雨後彌山遍野春時尤盛然蟄後蟲蛇始出有毒者最多山中人自能辨之秋菌味稍薄以火焙乾可㸃茶價亦貴瓠瓠類不一詩人所取抱甕之餘采之烹之亦山家一種佳味第不可與肉食者道耳茄子茄子一名落酥又名崑崙紫𤓰種莧其傍同澆灌之茄莧俱茂新採者味絶美蔡遵為吴興守齋前種白莧紫茄以為常饍五馬貴人猶能如此吾輩安可無此一種味也芋古人以蹲鴟起家又云園收芋栗未全貧則禦窮一䇿芋為稱首所謂煨得芋頭熟天子不如我且以為南面王樂其言誠過然寒夜擁罏此實真味别名土芝信不虚矣茭白古稱雕胡性尤宜水逐年移之則心不黑池塘中亦宜多植以佐灌園所缺山藥夲名薯藥出婁東岳王市者大如臂真不減天公掌定當取作常供夏取其子不堪食至如香芋烏芋鳬茨之屬皆非佳品烏芋即茨菇鳬茨即地栗蘿葡蔓菁蘿葡一名土酥蔓菁一名六利皆佳味也他如烏白二菘蓴芹薇蕨之屬皆當命園丁多種以供伊蒲第不可以此市利為賣菜傭耳長物志卷十一
