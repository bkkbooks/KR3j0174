body:
  text: 長物志卷六明文震亨撰几榻古人製几榻雖長短廣狹不齊置之齋室必古雅可愛又坐臥依憑無不便適燕衎之暇以之展經史閲書畫陳鼎彞羅肴核施枕簟何施不可今人製作徒取雕繪文飾以恱俗眼而古制蕩然令人慨歎實深志几榻第六榻坐髙一尺二寸屏高一尺三寸長七尺有竒橫一尺五寸周設木格中實湘竹下座不虛三面靠背後背與兩傍等此榻之定式也有古斷紋者有元螺鈿者其製自然古雅忌有四足或為螳螂腿下承以板則可近有大理石鑲者有退光朱黑漆中刻竹樹以粉填者有新螺鈿者大非雅器他如花楠紫檀烏木花梨照舊式制成俱可用一改長大諸式雖曰美觀俱落俗套更見元製榻有長丈五尺濶二尺餘上無屏者蓋古人連牀夜臥臥以足抵足其製亦古然今卻不適用短榻高尺許長四尺置之佛堂書齋可以習靜坐禪談玄揮麈更便斜倚俗名彌勒榻几以怪樹天生屈曲若環若帶之半者為之橫生三足出自天然摩弄滑澤置之榻上或蒲團可倚手頓顙又見圖畫中有古人架足而臥者製亦竒古禪椅以天台藤為之或得古樹根如虬龍詰曲臃腫槎牙四出可挂瓢笠及數珠瓶鉢等器更須瑩滑如玉不露斧斤者為佳近見有以五色芝粘其上者頗為添足天然几以文木如花梨鐵梨香楠等木為之第以濶大為貴長不可過八尺厚不可過五寸飛角處不可太尖須平圓乃古式照倭几下有拖尾者更竒不可用四足如書卓式或以古樹根承之不則用木如臺面濶厚者空其中略雕雲頭如意之類不可雕龍鳳花草諸俗式近時所製狹而長者最可厭書卓中心取濶大四周廂邊濶僅半寸許足稍矮而細則其製自古凡狹長混角諸俗式俱不可用漆者尤俗壁卓長短不拘但不可過濶飛雲起角螳螂足諸式俱可供佛或用大理及祁陽石鑲者出舊製亦可方卓舊漆者最多須取極方大古朴列坐可十數人者以供展玩書畫若近製八仙等式僅可供宴集非雅器也燕几别有譜圖臺几倭人所製種類大小不一俱極古雅精麗有鍍金鑲四角者有篏金銀片者有暗花者價俱甚貴近時倣舊式為之亦有佳者以置尊彞之屬最古若紅漆狹小三角諸式俱不可用椅椅之製最多曾見元螺鈿椅大可容二人其製最古烏木鑲大理石者最稱貴重然亦須照古式為之總之宜矮不宜高宜濶不宜狹其摺疊單靠吳江竹椅専諸禪椅諸俗式斷不可用踏足處須以竹鑲之庶歷久不壞杌杌有二式方者四面平等長者亦可容二人並坐圓杌須大四足出古亦有螺鈿朱黑漆者竹杌及縚環諸俗式不可用凳凳亦用狹邉廂者為雅以川柏為心以烏木廂之最古不則竟用雜木黑漆者亦可用交牀即古胡牀之式兩都有篏銀銀鉸釘圓木者携以山逰或舟中用之最便金漆摺疊者俗不堪用櫉藏書櫉須可容萬卷愈濶愈古惟深僅可容一册即濶至丈餘門必用二扇不可用四及六小櫉以有座者為雅四足者差俗即用足亦必髙尺餘下用櫉殿僅宜二尺不則兩櫉疊置矣櫉殿以空如一架者為雅小櫉有方二尺餘者以置古銅玉小器為宜大者用杉木為之可辟螙小者以湘妃竹及豆瓣楠赤水欏古黑漆斷紋者為甲品雜木亦俱可用但式貴去俗耳鉸釘忌用白銅以紫銅照舊式兩頭尖如梭子不用釘釘者為佳竹櫉及小木直楞一則市肆中物一則藥室中物俱不可用小者有內府填漆有日夲所製皆竒品也經櫉用朱漆式稍方以經册多長耳架書架有大小二式大者髙七尺餘濶倍之上設十二格每格僅可容書十册以便檢取下格不可置書以近地卑濕故也足亦當稍高小者可置几上二格平頭方木竹架及朱黑漆者俱不堪用佛厨佛卓用朱黑漆須極華整而無脂粉氣有內府雕花者有古漆斷紋者有日本製者俱自然古雅近有以斷紋器湊成者若製作不俗亦自可用若新漆八角委角及建窑佛像斷不可用也床以宋元斷紋小􅃮牀為第一次則內府所製獨眠牀又次則小木出髙手匠作者亦自可用永嘉粵東有摺疊者舟中携置亦便若竹牀及飄簷拔步彩漆卍字回紋等式俱俗近有以柏木硺細如竹者甚精宜閨閣及小齋中廂倭廂黑􅃮篏金銀片大者盈尺其鉸釘鎖鑰俱竒巧絶倫以置古玉重器或晉唐小卷最宜又有一種差大式亦古雅作方勝纓絡等花者其輕如紙亦可置卷軸香藥雜玩齋中宜多畜以備用又有一種古斷紋者上員下方乃古人經廂以置佛坐間亦不俗屏屏風之制最古以大理石鑲下座精細者為貴次則祁陽石又次則花蘂石不得舊者亦須倣舊式為之若紙糊及圍屏木屏俱不入品腳凳以木製滚凳長二尺濶六寸髙如常式中分一鐺內二空中車圓木二根兩頭留軸轉動以腳踹軸滚動往來蓋湧泉穴精氣所生以運動為妙竹踏凳方而大者亦可用古琴磚有狹小者夏月用作踏凳甚涼長物志卷六
