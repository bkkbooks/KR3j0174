body:
  text: 長物志卷四明文震亨撰禽魚語鳥拂閣以低飛遊魚排荇而徑度幽人㑹心輒令竟日忘倦顧聲音顔色飲啄態度逺而巢居穴處眠沙泳浦戲廣浮深近而穿屋賀厦知嵗司晨啼春噪晚者品類不可勝紀丹林緑水豈令凡俗之品䦨入其中故必疏其雅潔可供清玩者數種令童子愛養餌飼得其性情庶幾馴鳥雀狎鳬魚亦山林之經濟也志禽魚第四鶴華亭鶴窠村所出具體高俊緑足龜文最為可愛江陵鶴津維揚俱有之相鶴但取標格竒俊唳聲清亮頸欲細而長足欲瘦而節身欲人立背欲直削蓄之者當築廣臺㦯高岡土壠之上居以茅菴鄰以池沼飼以魚穀欲教以舞俟其飢置食于空野使童子拊掌頓足以誘之習之既熟一聞拊掌即便起舞謂之食化空林别墅白石青松惟此君最宜其餘羽族俱未入品鸂鶒鸂鶒能敕水故水族不能害蓄之者宜于廣池巨浸十數為羣翠毛朱喙燦然水中他如烏喙白鴨亦可蓄一二以代鵝羣曲欄垂栁之下遊泳可玩鸚鵡鸚鵡能言然須教以小詩及韻語不可令聞市井鄙俚之談聒然盈耳銅架食缸俱須精巧然此鳥及錦雞孔雀倒挂吐綬諸種皆斷為閨閣中物非幽人所需也百舌畫眉鸜鵒飼養馴熟綿蠻軟語百種雜出俱極可聽然亦非幽齊所宜或于曲廊之下雕籠畫檻㸃綴景色則可吳中最尚此鳥余謂有禽癖者當覓茂林高樹聽其自然弄聲尤覺可愛更有小鳥名黃頭好鬭形既不雅尤屬無謂朱魚朱魚獨盛吳中以色如辰州朱砂故名此種最宜盆蓄有紅而帶黃色者僅可㸃綴陂池魚類初尚純紅純白繼尚金盔金鞍錦被及印頭紅裹頭紅連腮紅首尾紅鶴頂紅繼又尚墨眼雪眼硃眼紫眼瑪瑙眼琥珀眼金管銀管時尚極以為貴又有堆金砌玉落花流水蓮臺八瓣隔斷紅塵玉帶圍梅花片波浪紋七星紋種種變熊難以盡述然亦隨意定名無定式也藍魚白魚藍如翠白如雪迫而視之腸胃俱見此即朱魚别種亦貴甚魚尾自二尾以至九尾皆有之第美鍾于尾身材未必佳蓋魚身必洪纖合度骨肉停勻花色鮮明方入格觀魚宜早起日未出時不論陂池盆盎魚皆蕩漾于清泉碧沼之間又宜凉天夜月倒影插波時時驚鱗潑刺耳目為醒至如微風披拂琮琮成韻雨過新漲縠紋皺緑皆觀魚之佳境也吸水盆中換水一兩日即底積垢膩宜用湘竹一段作吸水筒吸去之倘過時不吸色便不鮮美故佳魚池中斷不可蓄水缸有古銅缸大可容二石青緑四裹古人不知何用當是穴中注油㸃燈之物今取以蓄魚最古其次以五色內府官窑瓷州所燒純白者亦可用惟不可用宜興所燒花缸及七石牛腿諸俗式余所以列此者實以備清玩一種若必按圖而索亦為板俗長物志卷四
