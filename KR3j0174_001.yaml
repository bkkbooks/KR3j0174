  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0174_WYG_001-1a, image: WYG0872/WYG0872-0033a.png}
body:
  text: 長物志卷一明文震亨撰室廬居山水間者為上村居次之郊居又次之吾儕縱不能栖巖止谷追綺園之踪而混跡㕓市要須門庭雅潔室廬清靚亭臺具曠士之懷齊閣有幽人之致又當種佳木怪籜陳金石圖書令居之者忘老寓之者忘歸逰之者忘倦蘊隆則颯然而寒凛冽則煦然而燠若徒侈土木尚丹堊真同桎梏樊檻而已志室廬第一門用木為格以湘妃竹橫斜釘之或四或二不可用六兩傍用板為春帖必隨意取唐聮佳者刻于上若用石梱必須板扉石用方厚渾朴庶不涉俗門環得古青緑蝴蝶獸面㦯天雞叨餮之屬釘于上為佳不則用紫銅或精鐵如舊式鑄成亦可黃白銅俱不可用也漆惟朱紫黑三色餘不可用階自三級以至十級愈高愈古須以文石剝成種繡墩㦯草花數莖于內枝葉紛披映階傍砌以太湖石疊成者曰澀浪其制更竒然不易就復室須內高于外取頑石具苔班者嵌之方有巖阿之致窗用木為粗格中設細條三眼眼方二寸不可過大窗下填板尺許佛樓禪室間用菱花及象眼者窗忌用六㦯二㦯三㦯四隨宜用之室高上可用橫窗一扇下用低檻承之俱釘明瓦或以紙糊不可用綘素紗及梅花簟冬月欲承日製大眼風窗眼竟尺許中以線經其上庶紙不為風雪所破其制亦雅然僅可用之小齊丈室漆用金漆㦯朱黑二色雕花綵漆俱不可用欄干石欄最古第近于琳宫梵宇及人家冡墓傍池或可用然不如用石蓮柱二木欄為雅柱不可過高亦不可雕鳥獸形亭榭廊廡可用朱欄及鵝頸承坐堂中須以巨木雕如石欄而空其中頂用柿頂朱飾中用荷葉寶瓶緑飾卍字者宜閨閣中不甚古雅取畫圖中有可用者以意成之可也三橫木最便第太朴不可多用更須每楹一扇不可中竪一木分為二三若齊中則竟不必用矣照壁得文木如豆瓣楠之類為之華而復雅不則竟用素染或金漆亦可青紫及灑金描畫俱所最忌亦不可用六堂中可用一𢃄齊中則止中楹用之有以夾紗窗㦯細格代之者俱稱俗品堂堂之製宜宏敞精麗前後須層軒廣庭廊廡俱可容一席四壁用細磚砌者佳不則竟用粉壁梁用毬門高廣相稱層階俱以文石為之小堂可不設窗檻山齊宜明淨不可太敞明淨可爽心神太敞則費目力或傍簷置窗檻㦯由廊以入俱隨地所宜中庭亦須稍廣可種花木列盆景夏日去北扉前後洞空庭際沃以飯瀋雨漬苔生緑褥可愛繞砌可種翠藝草令遍茂則青葱欲浮前垣宜矮有取薜荔根瘞牆下灑魚腥水于牆上以引蔓者雖有幽致然不如粉壁為佳丈室丈室宜隆冬寒夜略倣北地暖房之製中可置卧榻及禪椅之屬前庭須廣以承日色留西窗以受斜陽不必開北牖也佛堂築基高五尺餘列級而上前為小軒及左右俱設歡門後通三楹供佛庭中以石子砌地列幡幢之屬另建一門後為小室可置臥榻橋廣池巨浸須用文石為橋雕鏤雲物極其精工不可入俗小溪曲澗用石子砌者佳四傍可種繡墩草板橋須三折一木為欄忌平板作朱卍字欄有以太湖石為之亦俗石橋忌三環板橋忌四方磬折尤忌橋上置亭子茶寮搆一斗室相傍山齊內設茶具教一童専主茶役以供長日清談寒宵兀坐幽人首務不可少廢者琴室古人有于平屋中埋一缸缸懸銅鐘以彂琴聲者然不如層樓之下蓋上有板則聲不散下空曠則聲透徹或于喬松修竹岩洞石室之下地清境絶更為雅稱耳浴室前後二室以牆隔之前砌鐵鍋後燃薪以俟更須密室不為風寒所侵近牆鑿井具轆轤為竅引水以入後為溝引水以出藻具巾帨咸具其中街徑庭除馳道廣庭以武康石皮砌者最華整花間坼側以石子砌成㦯以碎瓦片斜砌者雨久生苔自然古色寧必金錢作埒乃稱勝地哉樓閣樓閣作房闥者須回環窈窕供登眺者須軒敞𢎞麗藏書畫者須爽塏高深此其大略也樓作四面窗者前楹用窗後及兩傍用板閣作方樣者四面一式樓前忌有露臺捲蓬樓板忌用磚鋪蓋既名樓閣必有定式若復鋪磚與平屋何異高閣作三層者最俗樓下柱稍高上可設平頂臺築臺忌六角隨地大小為之若築于土岡之上四周用粗木作朱䦨亦雅海論忌用承塵俗所稱天花板是也此僅可用之廨宇中地屏則間可用之暖室不可加簟或用氍毺為地衣亦可然總不如細磚之雅南方卑濕空鋪最宜略多費耳室忌五柱忌有兩廂前後堂相承忌工字體亦以近官廨也退居則間可用忌傍無避弄庭較屋東偏稍廣則西日不逼忌長而狹忌矮而寬亭忌上鋭下狹忌小六角忌用葫蘆頂忌以茆蓋忌如鐘鼓及城樓式樓梯須從後影壁上忌置兩傍磚者作數曲更雅臨水亭榭可用藍絹為幔以蔽日色紫絹為帳以蔽風雪外此俱不可用尤忌用布以類酒船及市藥設帳也小室忌中隔若有北窗者則分為二室忌紙糊忌作雪洞此與混堂無異而俗子絶好之俱不可解忌為卍字窗傍填板忌牆角畫梅及花鳥古人最重題壁今即使顧陸㸃染鍾王濡筆俱不如素壁為佳忌長廊一式㦯更互其製庶不入俗忌竹木屏及竹籬之屬忌黃白銅為屈戍庭際不可鋪細方磚為承露臺則可忌兩楹而中置一梁上設乂手笆此皆元製而不甚雅忌用板隔隔必以磚忌梁椽畫羅紋及金方勝如古屋嵗久木色已舊未免繪飾必須高手為之凡入門處必小委曲忌太直齊必三楹傍更作一室可置臥榻面北小庭不可太廣以北風甚厲也忌中楹設欄楯如今拔步牀式忌穴壁為橱忌以瓦為牆有作金錢梅花式者此俱當付之一擊又鴟吻好望其名最古今所用者不知何物須如古式為之不則亦倣畫中室宇之製簷瓦不可用粉刷得巨栟櫚擘為承溜最雅否則用竹不可用木及錫忌有捲棚此官府設以聽兩造者于人家不知何用忌用梅花䈳堂簾惟溫州湘竹者佳忌中有花如繡補忌有字如夀山福海之類總之隨方制象各有所宜寧古無時寧朴無巧寧儉無俗至于蕭疏雅潔又本性生非强作解事者所得輕議矣長物志卷一
