body:
  text: 長物志卷三明文震亨撰水石石令人古水令人逺園林水石最不可無要湏廻環峭拔安挿得宜一峯則太華千尋一勺則江湖萬里又須修竹老木怪籐醜樹交覆角立蒼崖碧澗奔泉汛流如入深巖絶壑之中乃為名區勝地約略其名匪一端矣志水石第三廣池鑿池自畝以及頃愈廣愈勝最廣者中可置臺榭之屬㦯長堤横隔汀蒲􅜌葦雜植其中一望無際乃稱巨浸若須華整以文石為㟁朱欄廻遶忌中留土如俗名戰魚墩或擬金焦之類池傍植垂栁忌桃杏間種中畜鳬雁須十數為羣方有生意最廣處可置水閣必如圖畵中者佳忌置簰舍扵􅜌側植藕花削竹為䦨勿令蔓衍忌荷葉滿池不見水色小池階前石畔鑿一小池必須湖石四圍泉清可見底中畜朱魚翠藻㳺泳可玩四周樹野藤細竹能掘地稍深引泉胍者更佳忌方圎八角諸式瀑布山居引泉從高而下為瀑布稍易園林中欲作此須截竹長短不一盡承簷溜暗接藏石罅中以斧劈石疊高下鑿小池承水置石林立其下雨中能令飛泉濆薄潺湲有聲亦一竒也尤宜竹間松下青䓤掩映更自可觀亦有蓄水扵山頂客至去閘水從空直注者終不如雨中承溜為雅盖總屬人為此尤近自然耳鑿井井水味濁不可供烹煮然澆花洗竹滌硯拭几俱不可缺鑿井須扵竹樹之下深見泉脈上置轆轤引汲不則盖一小亭覆之石欄古號銀牀取舊製最大而古朴者置其上井有神井傍可置頑石鑿一小龕遇歳時奠以清泉一杯亦自有致天泉秋水梅水次之秋水白而洌梅水白而甘春冬二水春勝扵冬盖以和風甘雨故夏月暴雨不宜㦯因風雷蛟龍所致最足傷人雪為五榖之精取以煎茶最為幽況然新者有土氣稍陳乃佳承水用布扵中庭受之不可用簷溜地泉乳泉漫流如恵山泉為最勝次取清寒者泉不難扵清而難扵寒土多沙膩泥凝者必不清寒又有香而甘者然甘易而香難未有香而不甘者也瀑湧湍急者勿食食久令人有頭疾如廬山水簾天台瀑布以供耳目則可入水品則不宜溫泉下生硫黄亦非食品流水江水取去人逺者楊子南冷夾石渟淵特入首品河流通泉竇者必湏汲置候其澄澈亦可食丹泉名山大川仙翁修煉之䖏水中有丹其味異常能延年卻病此自然之丹液不易得也品石石以靈壁為上英石次之然二種品甚貴購之頗艱大者尤不易得高踰數尺者便屬竒品小者可置几案間色如漆聲如玉者最佳横石以蠟地而峯巒峭拔者為上俗言靈壁無峯英石無坡以余所見亦不盡然他石紋片粗大絶無曲折屼峍森聳崚嶒者近更有以大塊辰砂石青石緑為研山盆石最俗靈壁出鳳陽府㝛州靈壁縣在深山沙土中掘之乃見有細白紋如玉不起岩岫佳者如臥牛蟠螭種種異狀真竒品也英石出英州倒生岩下以鋸取之故底平起峯高有至三尺及寸餘者小齋之前疊一小山最為清貴然道逺不易致太湖石石在水中者為貴嵗久為波濤衝擊皆成空石面面玲瓏在山上者名旱石枯而不潤贋作彈窩若歴年嵗久斧痕已盡亦為雅觀吴中所尚假山皆用此石又有小石久沉湖中漁人網得之與靈壁英石亦頗相類第聲不清響堯峰石近時始出苔蘚叢生古朴可愛以未經採鑿山中甚多但不玲瓏耳然政以不玲瓏故佳崑山石出崑山馬鞍山下生扵山中掘之乃得以色白者為貴有鷄骨片胡桃塊二種然亦俗尚非雅物也間有高七八尺者置之高大石盆中亦可此山皆火石火氣暖故栽菖蒲等物扵上最茂惟不可置几案及盆盎中錦川將樂羊肚石品惟此三種最下錦川尤惡毎見人家石假山輙置數峯于上不知何味斧劈以大而頑者為雅若直立一片亦最可厭土瑪瑙出山東兖州府沂州花紋如瑪瑙紅多而細潤者佳有紅絲石白地上有赤紅紋有竹葉瑪瑙花斑與竹葉相類故名此俱可鋸板嵌几榻屏風之類非貴品也石子五色㦯大如拳㦯小如豆中有禽魚鳥獸人物方勝回紋之形置青緑小盆㦯宣窑白盆内班然可玩其價甚貴亦不易得然齋中不可多置近見人家環列數盆竟如賈肆新都人有名醉石齋者聞其藏石甚富且竒其地溪澗中另有純紅純緑者亦可愛玩大理石出滇中白若玉黑若墨為貴白㣲帯青黑㣲帯灰者皆下品但得舊石天成山水雲烟如米家山此為無上佳品古人以鑲屏風近始作几榻終為非古近京口一種與大理相似但花色不清石藥填之為山雲泉石亦可得髙價然真偽亦易辨真者更以舊為貴永石即祁陽石出楚中石不堅色好者有山水日月人物之象紫花者稍勝然多是刀刮成非自然者以手摸之凹凸者可驗大者以製屏亦雅長物志卷三
