body:
  text: 長物志卷十二明文震亨撰香茗香茗之用其利最溥物外高隱坐語道德可以清心悅神初陽薄暝興味蕭騷可以暢懷舒嘯晴窗拓帖揮麈間吟篝燈夜讀可以逺辟睡魔青衣紅袖密語談私可以助情熱意坐雨閉窗飯餘散步可以遣寂除煩醉筵醒客夜語蓬窗長嘯空樓冰絃戞指可以佐歡解渴品之最優者以沉香岕茶為首第焚煮有法必貞夫韻士乃能究心耳志香茗第十二伽南一名竒藍又名琪􅀈有糖結金絲二種糖結面黑若漆堅若玉鋸開上有油若糖者最貴金絲色黃上有線若金者次之此香不可焚焚之微有羶氣大者有重十五六斤以雕盤承之滿室皆香真為竒物小者以製扇墜數珠夏月佩之可以辟穢居常以錫合盛蜜飬之合分二格下格置蜜上格穿數孔如龍眼大置香使蜜氣上通則經久不枯沉水等香亦然龍涎香蘇門答剌國有龍涎嶼羣龍交卧其上遺沫入水取以為香浮水為上滲沙者次之魚食腹中刺出如斗者又次之彼國亦甚珍貴沉香質重劈開如墨色者佳沉取沉水然好速亦能沉以隔火炙過取焦者别置一器焚以熏衣被曾見世廟有水磨雕刻龍鳳者大二寸許蓋醮壇中物此僅可供玩片速香鯽魚片雉雞斑者佳以重實為美價不甚高有偽為者當辨唵叭香香膩甚著衣袂可經日不散然不宜獨用當同沉水共焚之一名黑香以軟淨色明手指可撚為丸者為妙都中有唵叭餅别以他香和之不甚佳角香俗名牙香以面有黑爛色黃紋直透者為黃熟純白不烘焙者為生香此皆常用之物當覓佳者但既不用隔火亦須輕置罏中庶香氣微出不作煙火氣甜香宣德年製清逺味幽可愛黑罈如漆白底上有燒造年月有錫罩蓋罐子者絶佳芙蓉梅花皆其遺製近京師製者亦佳黃黑香餅恭順侯家所造大如錢者妙甚香肆所製小者及印各色花巧者皆可用然非幽齋所宜宜以置閨閣安息香都中有數種總名安息月麟聚仙沉速為上沉速有雙料者極佳內府别有龍挂香倒挂焚之其架甚可玩若蘭香萬春百花等皆不堪用暖閣藝香暖閣有黃黑二種藝香短束出周府者佳然僅以備種類不堪用也蒼术嵗時及梅雨鬱蒸當間一焚之出句容茅山細梗者佳真者亦艱得品茶古今論茶事者無慮數十家若鴻漸之經君謨之録可謂盡善然其時法用熟碾為丸為挺故所稱有龍鳳團小龍團密雲龍瑞雲翔龍至宣和間始以茶色白者為貴漕臣鄭可聞始創為銀絲冰芽以茶剔葉取心清泉漬之去龍腦諸香惟新胯小龍蜿蜒其上稱龍團勝雪當時以為不更之法而我朝所尚又不同其烹試之法亦與前人異然簡便異常天趣悉備可謂盡茶之真味矣至于洗茶候湯擇器皆各有法寧特侈言烏府雲屯苦節建城等目而已哉虎丘天池最號精絶為天下冠惜不多産又為官司所據寂寞山家得一壺兩壺便為竒品然其味實亞于岕天池出龍池一帶者佳出南山一帶者最早微帶草氣岕浙之長興者佳價亦甚高今所最重荆溪稍下採茶不必太細細則芽初萌而味欠足不必太青青則茶已老而味欠嫩惟成梗蒂葉緑色而團厚者為上不宜以日晒炭火焙過扇冷以箬葉襯罌貯高處蓋茶最喜溫燥而忌冷濕也六合宜入藥品但不善炒不能發香而味苦茶之夲性實佳松蘿十數畝外皆非真松蘿茶山中亦僅有一二家炒法甚精近有山僧手焙者更妙真者在洞山之下天池之上新安人最重之兩都曲中亦尚此以易于烹煮且香烈故耳龍井天目山中早寒冬來多雪故茶之萌芽較晚採焙得法亦可與天池並洗茶先以滚湯候少溫洗茶去其塵垢以定碗盛之俟冷點茶則香氣自發候湯緩火炙活火煎活火謂炭火之有熖者始如魚目為一沸緣邊泉湧為二沸奔濤濺沫為三沸若薪火方交水釡才熾急取旋傾水氣未消謂之嫩若水踰十沸湯已失性謂之老皆不能發茶香滌器茶瓶茶盞不潔皆損茶味須先時洗滌淨布拭之以備用茶洗以砂為之製如碗式上下二層上層底穿數孔用洗茶沙垢悉從孔中流出最便茶罏湯瓶有薑鑄銅叨餮獸面火罏及純素者有銅鑄如鼎彞者皆可用湯瓶鉛者為上錫者次之銅者不可用形如竹筒者既不漏火又易點注瓷瓶雖不奪湯氣然不適用亦不雅觀茶壺壺以砂者為上蓋既不奪香又無熟湯氣供春最貴第形不雅亦無差小者時大賔所製又太小若得受水半升而形製古潔者取以注茶更為適用其提梁臥瓜雙桃扇面八稜細花夾錫茶替青花白地諸俗式者俱不可用錫壺有趙良璧者亦佳然宜冬月間用近時吳中歸錫嘉禾黃錫價皆最高然製小而俗金銀俱不入品茶盞宣廟有尖足茶盞料精式雅質厚難冷潔白如玉可試茶色盞中第一世廟有壇盞中有茶湯果酒後有金籙大醮壇用等字者亦佳他如白定等窑藏為玩器不宜日用蓋點茶須熁盞令熱則茶面聚乳舊窑器熁熱則易損不可不知又有一種名崔公窑差大可置果實果亦僅可用榛松新笋雞豆蓮實不奪香味者他如柑橙茉莉木樨之類斷不可用擇炭湯最惡煙非炭不可落葉竹篠樹梢松子之類雖為雅談實不可用又如暴炭膏薪濃煙蔽室更為茶魔炭以長興茶山出者名金炭大小最適用以麩火引之可稱湯友長物志卷十二
