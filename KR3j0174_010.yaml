body:
  text: 長物志卷十明文震亨撰舟車舟之習于水也𢎞舸連軸巨檻接艫既非素士所能辦蜻蛉蚱蜢不堪起居要使軒窗䦨檻儼若精舍室陳厦饗靡不咸宜用之祖逺餞近以暢離情用之登山臨水以宣幽思用之訪雪載月以寫高韻或芳辰綴賞或靘女采蓮或子夜清聲或中流歌舞皆人生適意之一端也至如濟勝之具籃輿最便但使製度新雅便堪登高涉逺寧必飾以珠玉錯以金貝被以繢罽藉以簟茀鏤以鈎膺攴以輪轅䩓以鞗革和以鳴鸞乃稱周行魯道哉志舟車第九巾車今之肩輿即古之巾車也第古用牛馬今用人車實非雅士所宜出閩廣者精麗且輕便楚中有以藤為扛者亦佳近金陵所製纒藤者頗俗藍輿山行無濟勝之具則藍輿似不可少武林所製有坐身踏足處俱以繩絡者上下峻坂皆平最為適意惟不能避風雨有上置一架可張小幔者亦不雅觀舟形如剗船底惟平長可三丈有餘頭濶五尺分為四倉中倉可容賔主六人置卓凳筆牀酒鎗鼎彞盆玩之屬以輕小為貴前倉可容僮僕四人置壺榼茗罏茶具之屬後倉隔之以板傍容小弄以便出入中置一榻一小几小㕑上以板承之可置書卷筆硯之屬榻下可置衣廂虎子之屬幔以板不以蓬簟兩傍不用欄楯以布絹作帳用蔽東西日色無日則高捲捲以帶不以鈎他如樓船方舟諸式皆俗小船長丈餘濶三尺許置于池塘中㦯時鼓枻中流或時繫于栁隂曲岸執竿把釣弄月吟風以藍布作一長幔兩邊走簷前以二竹為柱後縛船尾釘兩圈處一童子刺之長物志卷十
