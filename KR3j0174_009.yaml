body:
  text: 長物志卷九明文震亨撰衣飾衣冠製度必與時宜吾儕既不能披鶉帯索又不當綴玉垂珠要須夏葛冬裘被服􅈺雅居城市有儒者之風入山林有隱逸之象若徒染五采飾文繢與銅山金穴之子侈靡鬭麗亦豈詩人粲粲衣服之㫖乎至扵蟬冠朱衣方心曲領玉珮朱履之為漢服也幞頭大袍之為隋服也紗㡌圓領之為唐服也簷㡌襴衫申衣幅巾之為宋服也巾環襈領㡌子繫腰之為金元服也方巾團領之為國朝服也皆歴代之制非所敢輕議也志衣飾第八道服製如申衣以白布為之四邊延以緇色布或用茶褐為袍縁以皂布有月衣鋪地如月披之則如鶴氅二者用以坐禪䇿蹇披雪避寒俱不可少禪衣以灑海剌為之俗名𤨏哈剌盖畨語不易辨也其形似胡羊毛片縷縷下垂𦂳厚如氊其用耐久來自西域聞彼中亦甚貴被以五色氆􅂒為之亦出西蕃濶僅尺許與𤨏哈剌相類但不𦂳厚次用山東繭紬最耐久其落花流水紫白等錦皆以美觀不甚雅以真紫花布為大被嚴寒用之有畵百蝶扵上稱為蝶夢者亦俗古人用蘆花為被今卻無此製褥京師有摺疊臥褥形如圍屏展之盈丈收之僅二尺許厚三四寸以錦為之中實以燈心最雅其椅榻等褥皆用古錦為之錦既敝可以􅏻潢卷冊絨單出陜西甘肅紅者色如珊瑚然非幽齋所宜夲色者最雅冬月可以代席狐腋貂褥不易得此亦可當溫柔郷矣氊者不堪用青氊用以襯書大字帳冬月以繭紬或紫花厚布為之紙帳與紬絹等帳俱俗錦帳帕帳俱閨閤中物夏月以蕉布為之然不易得吴中青撬紗及花手巾製帳亦可有以畵絹為之有寫山水墨梅扵上者此皆欲雅反俗更有作大帳號為漫天帳夏月坐臥其中置几榻櫉架等物雖適意亦不古寒月小齋中製布帳扵牕檻之上青紫二色可用冠鐵冠最古犀玉琥珀次之沉香葫蘆者又次之竹籜癭木者最下製惟偃月高士二式餘非所宜巾漢巾去唐式不逺今所尚披雲巾最俗或自以意為之幅巾最古然不便扵用笠細藤者佳方廣二尺四寸以皂絹綴簷山行以遮風日又有葉笠羽笠此皆方物非可常用履冬月秧履最適且可暖足夏月棕鞋惟温州者佳若方舄等樣製作不俗者皆可為濟勝之具長物志卷九
