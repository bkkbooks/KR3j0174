  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0174_WYG_008-1a, image: WYG0872/WYG0872-0076a.png}
body:
  text: 長物志卷八明文震亨撰位置位置之法煩簡不同寒暑各異高堂廣榭曲房奥室各有所宜即如圖書鼎彞之屬亦湏安設得所方如圖畵雲林清秘高梧古石中僅一几一榻令人想見其風致真令神骨俱冷故韻士所居入門便有一種髙雅絶俗之趣若使前堂飬鷄牧豕而後庭侈言澆花洗石政不如凝塵滿案環堵四壁猶有一種蕭􅄫氣味耳志位置第十坐几天然几一設扵室中左偏東向不可廹近牕檻以逼風日几上置舊研一筆筒一筆覘一水中丞一研山一古人置研俱在左以墨光不閃眼且扵燈下更宜書冊鎮紙各一時時拂拭使其光可鑒乃佳坐具湘竹榻及禪椅皆可坐冬月以古錦製縟或設臯比俱可椅榻屏架齋中僅可置四椅一榻他如古須彌座短榻矮几壁几之類不妨多設忌靠壁平設數椅屏風僅可置一面書架及櫉俱列以置圖史然亦不宜太雜如書肆中懸畵懸畵宜高齋中僅可置一軸扵上若懸兩壁及左右對列最俗長畵可挂高壁不可用挨畵竹曲挂畵卓可置竒石㦯時花盆景之屬忌置朱紅漆等架堂中宜挂大幅横披齋中宜小㬌花鳥若單條扇面斗方挂屏之類俱不雅觀畵不對景其言亦謬置罏于日坐几上置倭臺几方大者一上置罏一香盒大者一置生熟香小者二置沉香香餅之類筯瓶一齋中不可用二罏不可置扵挨畵卓上及瓶盒對列夏月宜用磁罏冬月用銅罏置缾隨瓶製置大小倭几之上春冬用銅秋夏用磁堂屋宜大書屋宜小貴銅瓦賤金銀忌有環忌成對花宜瘦巧不宜煩雜若挿一枝須擇枝柯竒古二枝須高下合挿亦止可一二種過多便如酒肆惟秋花挿小瓶中不論供花不可閉牕户焚香煙觸即萎水仙尤甚亦不可供扵畵卓上小室几榻俱不宜多置但取古製狹邊書几一置扵中上設筆硯香合薰罏之屬俱小而雅别設石小几一以置茗甌茶具小榻一以供偃臥趺坐不必挂畵或置古竒石或以小佛橱供鎏金小佛扵上亦可臥室地屏天花板雖俗然臥室取乾燥用之亦可第不可彩畵及油漆耳面南設臥榻一榻後别留半室人所不至以置薰籠衣架盥匜廂奩書燈之屬榻前僅置一小几不設一物小方杌二小橱一以置藥玩器室中精潔雅素一渉絢麗便如閨閤中非幽人眠雲夢月所宜矣更湏穴壁一貼為壁牀以供連牀夜話下用抽替以置履襪庭中亦不須多植花木第取異種宜秘惜者置一株于中更以靈壁英石伴之亭榭亭榭不蔽風雨故不可用佳器俗者又不可耐須得舊漆方面粗足古朴自然者置之露坐宜湖石平矮者散置四傍其石墩瓦墩之屬俱置不用尤不可用朱架架官磚于上敞室長夏宜敞室盡去窗檻前梧後竹不見日色列木几極長大者于正中兩傍置長榻無屏者各一不必挂畵盖佳畵夏日易燥且後壁洞開亦無處宜懸挂也北牕設湘竹榻置簟于上可以髙臥几上大硯一青緑水盆一尊彞之屬俱取大者置建蘭一二盆于几案之側竒峯古樹清泉白石不妨多列湘簾四垂望之如入清涼界中佛室内供烏絲藏佛一尊以金鏒甚厚慈容端整妙相具足者為上或宋元脫紗大士像俱可用古漆佛櫉若香象唐象及三尊並列接引諸天等象號曰一堂并朱紅小木等櫉皆僧寮所供非居士所宜也長松石洞之下得古石像最佳案頭以舊磁淨瓶獻花凈碗酌水石鼎印香夜燃石燈其鐘磬幡幢几榻之類次第鋪設俱戒纎巧鐘磬尤不可並列用古倭漆經廂以盛梵典庭中列施食臺一幡竿一下用古石蓮座石幢一幢下植雜草花數種石須古製不則亦以水蝕之長物志卷八
